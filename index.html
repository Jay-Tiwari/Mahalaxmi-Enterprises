<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahalaxmi Enterprises | Precision Tech</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #010409;
            --accent-cyan: #06b6d4;
            --accent-blue: #2563eb;
            --accent-glow: rgba(6, 182, 212, 0.4);
            --text-gray: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            color: white;
        }

        /* --- CINEMATIC BACKGROUND LAYER --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0f172a 0%, #010409 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-in-out;
        }

        #splash-screen::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
        }

        .scanline {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(6, 182, 212, 0.03) 50%);
            background-size: 100% 4px;
            z-index: 5;
            pointer-events: none;
            opacity: 0.5;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, white 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0.1;
            animation: drift 30s linear infinite;
        }

        @keyframes drift {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-80px);
            }
        }

        .splash-content {
            position: relative;
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 700px;
        }

        /* --- MINI LOGO SYSTEM (60px) --- */
        .logo-container {
            position: relative;
            width: 60px;
            /* Decreased size further[cite: 3] */
            height: 60px;
            /* Decreased size further[cite: 3] */
            margin: 0 auto 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-aura {
            position: absolute;
            width: 50px;
            height: 50px;
            background: var(--accent-cyan);
            border-radius: 50%;
            filter: blur(25px);
            opacity: 0.2;
            animation: pulse-aura 4s ease-in-out infinite;
        }

        .logo-img {
            width: 100%;
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 0 8px var(--accent-glow));
            animation: logo-float 3s ease-in-out infinite;
        }

        .fallback-icon {
            font-size: 1.8rem;
            /* Adjusted for smaller container[cite: 3] */
            color: white;
            filter: drop-shadow(0 0 8px var(--accent-cyan));
            z-index: 10;
        }

        @keyframes pulse-aura {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.15;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.25;
            }
        }

        @keyframes logo-float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        /* --- TYPOGRAPHY --- */
        .business-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.6rem, 6vw, 2.8rem);
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            background: linear-gradient(180deg, #ffffff 0%, #64748b 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: tracking-in 1.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
        }

        @keyframes tracking-in {
            0% {
                letter-spacing: -0.5em;
                opacity: 0;
                filter: blur(12px);
            }

            100% {
                opacity: 1;
                filter: blur(0);
            }
        }

        .tagline {
            color: var(--text-gray);
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 3.5rem;
            opacity: 0;
            animation: fadeIn 1.5s forwards 1s;
        }

        /* --- SERVICE TILES --- */
        .icons-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 3.5rem;
        }

        .icon-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-left: 2px solid var(--accent-cyan);
            padding: 25px 10px;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s forwards;
        }

        .icon-box:hover {
            background: rgba(6, 182, 212, 0.1);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .icon-box i {
            font-size: 1.4rem;
            color: var(--accent-cyan);
            margin-bottom: 12px;
            display: block;
        }

        .icon-box span {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* --- PROGRESS BAR --- */
        .loading-container {
            padding: 0 15%;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            color: var(--accent-cyan);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .progress-bar-bg {
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-cyan);
            transition: width 0.2s ease-out;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .icons-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .business-name {
                letter-spacing: 6px;
            }

            .loading-container {
                padding: 0 5%;
            }
        }
    </style>
</head>

<body>

    <div id="splash-screen">
        <div class="scanline"></div>
        <div class="particles"></div>

        <div class="splash-content">
            <div class="logo-container">
                <div class="logo-aura"></div>
                <img src="/assets/logo.png" alt="Logo" class="logo-img"
                    onerror="this.style.display='none'; document.getElementById('fallback').style.display='block'">
                <i id="fallback" class="fa-solid fa-microchip fallback-icon" style="display:none;"></i>
            </div>

            <h1 class="business-name">Mahalaxmi</h1>
            <p class="tagline">The Gold Standard in Tech Solutions</p>

            <div class="icons-row">
                <div class="icon-box" style="animation-delay: 1.2s">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span>SECURITY</span>
                </div>
                <div class="icon-box" style="animation-delay: 1.4s">
                    <i class="fa-solid fa-laptop"></i>
                    <span>SYSTEMS</span>
                </div>
                <div class="icon-box" style="animation-delay: 1.6s">
                    <i class="fa-solid fa-screwdriver-wrench"></i>
                    <span>SERVICE</span>
                </div>
                <div class="icon-box" style="animation-delay: 1.8s">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span>RELIANCE</span>
                </div>
            </div>

            <div class="loading-container">
                <div class="status-header">
                    <span id="status">INITIALIZING_CORE...</span>
                    <span id="percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="progress"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const progress = document.getElementById("progress");
            const statusText = document.getElementById("status");
            const percentText = document.getElementById("percent");
            const splash = document.getElementById("splash-screen");

            let width = 0;
            const messages = ["AUTHENTICATING...", "LOADING_ASSETS...", "ESTABLISHING_SECURE_LINK...", "WELCOME_DIRECTOR"];
            const nextPageUrl = "pages/index.html";

            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    setTimeout(completeBoot, 600);
                } else {
                    width += Math.floor(Math.random() * 3) + 1;
                    if (width > 100) width = 100;
                    progress.style.width = width + "%";
                    percentText.innerText = width + "%";

                    if (width < 25) statusText.innerText = messages[0];
                    else if (width < 55) statusText.innerText = messages[1];
                    else if (width < 85) statusText.innerText = messages[2];
                    else statusText.innerText = messages[3];
                }
            }, 50);

            function completeBoot() {
                splash.style.opacity = "0";
                setTimeout(() => { window.location.href = nextPageUrl; }, 1000);
            }
        });
    </script>
</body>

</html>
